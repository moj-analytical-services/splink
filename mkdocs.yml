site_name: Splink
site_url: https://moj-analytical-services.github.io/splink/
use_directory_urls: false
repo_url: https://github.com/moj-analytical-services/splink
edit_uri: edit/master/docs/
theme:
  icon:
    repo: fontawesome/brands/github
  name: "material"
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - search.highlight
    - search.share
    - search.suggest
    - navigation.indexes
    - navigation.footer
    - content.action.edit
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.follow
  logo: "img/favicon.ico"
  favicon: "img/favicon.ico"
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  custom_dir: docs/overrides
plugins:
  - blog:
      post_date_format: long
      archive: false
  - search
  - mknotebooks:
      tag_remove_configs:
        remove_input_tags:
          - hide_input
        remove_all_outputs_tags:
          - hide_output
  - tags
  # automatic documentation of python objects from docstrings
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
  # embedding videos, see e.g. docs/dev_guides/charts/understanding_and_editing_charts.md
  - mkdocs-video:
      is_video: True
      video_autoplay: false
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
  - llmstxt:
      markdown_description: |
        Splink is a Python library for probabilistic record linkage, deduplication,
        and entity resolution across backends such as DuckDB, Spark, SQLite, and
        PostgreSQL. It is aimed at data scientists, analysts, researchers, and
        engineers building or maintaining linkage pipelines.

        Agents should fetch /llms.txt first as a compact map of the documentation,
        then fetch only the linked Markdown pages that match the task. Start with
        the overview and getting started pages for orientation, the core concepts
        pages to understand settings, blocking, comparisons, and theory, the
        tutorials and examples for end-to-end workflows, and the API reference for
        method-level detail.
      full_output: llms-full.txt
      sections:
        Overview:
          - index.md: Product overview, capabilities, and high-level positioning.
          - topic_guides/topic_guides_index.md: Map of the conceptual user guide.
          - api_docs/api_docs_index.md: Map of the API reference.
        Getting started:
          - getting_started.md: Installation and the first end-to-end Splink workflow.
          - topic_guides/splink_fundamentals/querying_splink_results.md: How to inspect and query Splink outputs after running a model.
        Core concepts:
          - topic_guides/theory/record_linkage.md: Record linkage fundamentals and terminology.
          - topic_guides/theory/fellegi_sunter.md: The probabilistic model underlying Splink.
          - topic_guides/splink_fundamentals/settings.md: How Splink models are defined.
          - topic_guides/splink_fundamentals/link_type.md: When to use linking versus deduplication.
          - topic_guides/blocking/blocking_rules.md: Blocking rules and why they control scale.
          - topic_guides/comparisons/comparisons_and_comparison_levels.md: Comparison structure and match logic.
        Tutorials and examples:
          - demos/examples/examples_index.md: Index of runnable examples by backend and problem type.
        How-to guides:
          - topic_guides/data_preparation/feature_engineering.md: Preparing columns and engineered features.
          - topic_guides/blocking/model_training.md: Choosing blocking rules for model training.
          - topic_guides/comparisons/term-frequency.md: Term-frequency adjustments for skewed data.
          - topic_guides/training/training_rationale.md: Choosing and sequencing training methods.
          - topic_guides/evaluation/overview.md: Evaluating models, links, and clusters.
          - topic_guides/performance/drivers_of_performance.md: Main performance levers when jobs are slow.
        API reference:
          - api_docs/training.md: Training methods on the Linker.
          - api_docs/inference.md: Inference and prediction methods.
          - api_docs/linker_clustering.md: Clustering APIs.
          - api_docs/evaluation.md: Evaluation APIs.
          - api_docs/comparison_library.md: Built-in comparison helpers.
          - api_docs/comparison_level_library.md: Built-in comparison level helpers.
          - api_docs/blocking.md: Blocking API reference.
          - api_docs/datasets.md: Built-in datasets for demos and tests.
        Backends and troubleshooting:
          - topic_guides/splink_fundamentals/backends/backends.md: Backend selection and backend-specific behavior.
          - topic_guides/splink_fundamentals/backends/postgres.md: PostgreSQL-specific guidance.
          - topic_guides/performance/optimising_duckdb.md: DuckDB performance tuning.
          - topic_guides/performance/optimising_spark.md: Spark performance tuning.
          - dev_guides/changing_splink/development_quickstart.md: Contributor setup when the task involves changing Splink itself.
          - dev_guides/debug_modes.md: Debugging and inspection modes when behavior is unclear.
hooks:
  - docs/hooks/__init__.py

markdown_extensions:
  # add id/style etc to markdown elements - see getting started button in docs/index.md
  # markdown
  - attr_list
  # for frontmatter in --- blocks, for e.g. tags
  # mkdocs-material
  - meta
  # for admonition blocks e.g. !!! warning
  # markdown
  - admonition
  # markdown in html blocks, e.g. <figure> in docs/topic_guides/comparisons/term-frequency.md
  # markdown
  - md_in_html
  # for expandables with ???
  # pymdown-extensions
  - pymdownx.details
  # for inline latex - see e.g. docs/topic_guides/theory/fellegi_sunter.md
  # pymdown-extensions
  - pymdownx.arithmatex:
      generic: true
  # code markdown in admonitions, e.g. docs/getting_started.md
  - pymdownx.superfences
  # tabbed sections with === - e.g. docs/index.md
  # pymdown-extensions
  - pymdownx.tabbed:
      alternate_style: true
  # table of contents
  # markdown
  - toc:
      permalink: True
      toc_depth: 3
  # emojis specified as e.g. :link: - see e.g. docs/blog/posts/2024-01-25-ethics.md
  # pymdown-extensions
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # footnotes see e.g. docs/topic_guides/theory/fellegi_sunter.md
  # mkdocs-material
  - footnotes
  # ::cards:: - see e.g. docs/charts/index.md
  # neoteroi-mkdocs
  - neoteroi.cards
