name: Pytest Postgres

on:
  pull_request:
    branches:
      - master
      - "**dev"
    paths:
      - "splink/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

permissions: {}

jobs:
  test:
    name: Pytest Postgres (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      pg_splink_ci:
        image: postgres
        env:
          POSTGRES_USER: splinkognito
          POSTGRES_PASSWORD: splink123!
          POSTGRES_DB: splink_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv
        id: setup_uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Install Python ${{ matrix.python-version }}
        id: install_python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        id: install_dependencies
        run: uv sync --python ${{ matrix.python-version }}
  
      - name: Run tests
        id: run_tests
        run: uv run python -m pytest -v --durations=0 -m "postgres_only" tests/
