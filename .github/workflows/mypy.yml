name: typechecking
on:
  pull_request:
    paths:
      - splink/**
      - tests/**
      - pyproject.toml
      - uv.lock

permissions: {}

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup uv
        id: setup_uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Install Python 3.12
        id: install_python312
        run: uv python install 3.12

      - name: Install dependencies
        id: install_dependencies
        run: uv sync --python 3.12 --group typechecking-dev

      - name: Run mypy
        id: mypy
        run: make typecheck

      - name: Run ty, but don't fail on error
        id: ty
        run: make typecheck-dev
