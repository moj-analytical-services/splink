name: Demo Tutorials Notebooks

on:
  pull_request:
    paths:
      - splink/**
      - docs/demos/tutorials/**
      - pyproject.toml
      - "uv.lock"
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test tutorial notebooks with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv
        id: setup_uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Install Python ${{ matrix.python-version }}
        id: install_python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        id: install_dependencies
        run: uv sync --python ${{ matrix.python-version }} --group demos

      - name: Reduce notebook size
        id: reduce_notebook_size
        run: uv run python scripts/reduce_notebook_runtime.py

      - name: Run tests
        id: run_tests
        run: |
          scripts/run_notebooks.sh demos/tutorials
